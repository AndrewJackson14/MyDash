<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>13 Stars Media — MyDash</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<noscript><link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" /></noscript>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', 'DM Sans', 'Segoe UI', system-ui, sans-serif; background: #08090D; color: #E4E8F0; }
  select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
</style>
<script>
  // #14: Select-all on focus for text and number inputs
  document.addEventListener('focusin', function(e) {
    var t = e.target;
    if (t.tagName === 'INPUT' && (t.type === 'text' || t.type === 'number' || t.type === 'url' || t.type === 'email' || !t.type)) {
      setTimeout(function() { t.select(); }, 0);
    }
  });
</script>
  <script type="module" src="/src/main.jsx"></script>
</head>
<body><div id="root"></div></body>
